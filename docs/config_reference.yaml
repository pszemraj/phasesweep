# phasesweep configuration reference
#
# This is a hand-written per-key contract, not a config template. Every line is commented so the file cannot be mistaken for a runnable experiment or suite.
# A UTF-8 YAML mapping with a top-level `suite` key is parsed as a Suite; any other top-level mapping is parsed as an Experiment.
# Unknown keys are rejected in every object. Duplicate YAML mapping keys are rejected at every depth.
# Standard YAML merge keys are accepted; an explicit key may override the value inherited from an anchor.
# `required` means the key must be present. Otherwise the displayed `= value` is the default, and `| None` means YAML null is accepted subject to the stated interactions.

# EXPERIMENT ROOT

# experiment: str (required)
# Nonempty ASCII `[A-Za-z0-9_-]+`; selects output paths, locks, and `<experiment>::<phase>` Optuna study names.

# storage: str | None = null
# `null` creates fresh in-memory studies and restarts trial numbers on every invocation. Trial directories remain generation/attempt-scoped, but study state and the current winner/summary view restart; use persistent storage for resumable work.
# `sqlite:///...` is persistent only with every phase at `n_jobs: 1`; `journal:///...` supports same-host parallel trials; other URLs pass through to Optuna. External RDB storage does not make multi-host phasesweep orchestration safe.
# Three-slash SQLite/Journal paths are relative to the invocation cwd; absolute POSIX paths use four slashes.

# workdir: str = "./runs"
# Output root for trial artifacts, winners, and summaries. Relative paths resolve from the invocation cwd, not the config file.
# With persistent storage, changing only workdir reuses existing Optuna history while moving newly written artifacts; keep it stable across resumptions.

# trial_command: str (required)
# Shell command for one trial. Supported format fields are `{overrides}`, `{overrides_path}`, `{trial_dir}`, `{trial_id}`, `{phase}`, and `{run_name}`; path-like substitutions and rendered override tokens are shell-quoted.
# Config loading checks format syntax and supported fields, but not executable/path existence, trainer parser compatibility, evidence production, or JSON serializability.
# An override-free phase may use a constant command. Any inherited, contract, fixed, or sampled override requires the placeholder selected by override_format.

# provenance: dict[str, str] = {}
# Operator-declared identities for trainer code, base config, data, dependencies, container, tokenizer, or other inputs outside this YAML. Keys and values must be nonempty.
# Persistent storage requires at least one entry. The complete mapping is included in semantic fingerprints; update its values whenever an external input changes. PhaseSweep does not inspect imports or hash arbitrary trial_command inputs.

# override_format: Literal["argparse", "hydra", "json_file"] = "argparse"
# `argparse` requires `{overrides}` and emits `--key value`; booleans are lowercase, null is `None`, and lists are bracketed. Other values are stringified.
# `hydra` requires `{overrides}` and emits `key=value`; it accepts scalars/lists and rejects mappings during config preflight.
# `json_file` requires `{overrides_path}`, preserves JSON types, and expands dotted keys into `<trial_dir>/overrides.json`. Validation and dry-run do not write that file, so non-JSON fixed values can still fail at real launch.

# metric: Metric (required)
# Metric object keys:
#   name: str = "objective"
#   Must be distinct from every constraints[].name.
#   goal: Literal["minimize", "maximize"] = "minimize"
#   Sets Optuna direction and the sign used by promotion.min_delta.
#   extractor: ObjectiveExtractor (required)
#   Accepts json_envelope, log_regex, or wandb. Plain json is not a primary-objective extractor because it cannot prove attempt identity. The extracted value must be finite or the trial fails. Extractor shapes are defined below.

# constraints: list[Constraint] = []
# Each Constraint object has these keys:
#   name: str (required)
#   Must be distinct from metric.name and every other constraint name.
#   extractor: Extractor (required)
#   Extraction failure or a non-finite value fails the trial; Extractor shapes are defined below.
#   min: float | None = null
#   max: float | None = null
#   At least one finite inclusive bound is required and min must be <= max. A finite violation completes the trial as infeasible, prevents it from winning, and counts toward max_consecutive_failures; current samplers still receive its objective without feasibility guidance.

# contracts: dict[str, Contract] = {}
# Mapping names are referenced verbatim by phases[].contracts. Each Contract object has these keys:
#   fixed_overrides: dict[str, Any] = {}
#   Keys use the override-key grammar documented on phases[].fixed_overrides. Applied contract values override inherited values and are immutable within that phase.
#   gates: list[Gate] = []
#   Evaluated before phase-local gates. Gate shapes are defined below.

# phases: list[Phase] (required; min length 1)
# Phase names must be unique and are evaluated in declaration order. Each Phase object accepts the following keys.

# name: str (required)
# Nonempty ASCII `[A-Za-z0-9_-]+`; used in paths and Optuna study names.

# comment: str | None = null
# Design note shown by `validate` and `show-winners`. It has no trial-runtime effect and is excluded from phase fingerprints, but suite generations retain it in their historical plan identity.

# inherits: list[str] = []
# Names prior phases whose exposed `effective_overrides` become the lowest-priority override layer; forward references are rejected.
# Inherited keys cannot be sampled again. An exact collision from multiple parents requires a local fixed_overrides value; dotted parent/subkey collisions cannot be resolved and are rejected.

# fixed_overrides: dict[str, Any] = {}
# Values applied to every trial after inherited and contract values but before sampled values. A local fixed value may deliberately reset an inherited exact key, but cannot replace an applied contract key or share a key with search_space.
# Every key is a nonempty dotted path of `[A-Za-z0-9_-]+` segments. Across inherited, contract, fixed, and sampled keys, a key and its prefix (such as a scalar parent plus a nested child) cannot coexist.

# contracts: list[str] = []
# Names from top-level contracts. Unknown names are rejected; two applied contracts cannot define the same fixed key, and contract fixed keys cannot collide with local fixed or sampled keys.

# search_space: dict[str, SearchParam] = {}
# Empty is valid for repeated fixed-configuration trials. Nonempty keys use the same dotted override-key grammar as fixed_overrides; values use one SearchParam shape defined below.
# Keys named `seed` or ending in `.seed` require allow_seed_search: true.

# n_trials: int (required; >= 1)
# Monotonic target number of terminal attempts in this phase's study; COMPLETE, FAIL, and PRUNED trials all count. Persistent random/grid reruns launch only the remaining top-up. Lowering an accepted target is rejected; use a new experiment name for a smaller study.
# For a full grid, set this to the grid cardinality; a smaller value requires allow_partial_grid: true.

# n_jobs: int = 1 (>= 1)
# Maximum concurrent trials inside one orchestrator. SQLite rejects values > 1; a smaller GPU pool can serialize trainer launches below this number.
# TPE enables its parallel constant-liar heuristic when this is > 1. TPE/CMA-ES cross-invocation top-ups are rejected because their process-local continuation state is not fully durable.

# gpu_policy: Literal["single_per_trial", "whole_node", "none"] = "single_per_trial"
# `single_per_trial` leases one detected/configured CUDA-visible token per active trainer; a single-job phase with no visible GPU runs without isolation.
# `whole_node` requires n_jobs: 1 and leases all visible tokens for the trainer. `none` acquires no GPU locks, forbids gpu_ids/gpu_devices, and with n_jobs > 1 requires allow_no_gpu_isolation: true.
# gpu_policy is semantic: changing it invalidates reuse of an existing persistent phase study.

# gpu_ids: list[int] | None = null
# If set, a nonempty list of non-negative CUDA indices. Mutually exclusive with gpu_devices and forbidden by gpu_policy: "none"; duplicates are removed in first-seen order.
# If both explicit lists are null, phasesweep uses ambient CUDA_VISIBLE_DEVICES or nvidia-smi detection.

# gpu_devices: list[str] | None = null
# If set, a nonempty list of CUDA_VISIBLE_DEVICES tokens, including GPU/MIG UUIDs. Tokens are stripped, cannot be empty, contain commas, or equal `-1`, and are deduplicated in first-seen order.
# Mutually exclusive with gpu_ids and forbidden by gpu_policy: "none".

# allow_no_gpu_isolation: bool = false
# Set true only for intentional CPU-only parallel trials or an external scheduler that already isolates devices. Required when n_jobs > 1 has no detectable GPU tokens, and when gpu_policy is "none" with n_jobs > 1.

# max_consecutive_failures: int = 5 (>= 1)
# Stops scheduling after this many consecutive failed or infeasible results; a feasible result resets the count. Already-running parallel peers may still finish after the threshold is reached.
# Raise only when failures are expected and informative; the default catches broken trainer/evidence contracts early.

# sampler: Sampler = {}
# Sampler object keys:
#   type: Literal["tpe", "random", "grid", "cmaes"] = "tpe"
#   `grid` rejects log parameters, requires float steps, and requires n_trials to equal cardinality unless allow_partial_grid is true. `cmaes` rejects categorical parameters and requires the installed `cmaes` dependency.
#   seed: int | None = null
#   Seed for sampler behavior within one invocation; grid uses it for traversal order. Seeded random draws are keyed by durable trial identity so supported top-up batching does not restart the stream. TPE/CMA-ES top-ups are rejected rather than described as reproducible across process boundaries.
#   n_startup_trials: int = 10 (>= 0)
#   Used only by TPE; ignored by random, grid, and CMA-ES.

# timeout_seconds_per_trial: float | None = 86400.0 (>= 0 and finite when set)
# Bounds the trainer process group; `0` is an immediate timeout, not disabled. `null` disables this guard only when allow_unbounded_trials is true.
# This field is semantic: changing it invalidates reuse of an existing persistent phase study.

# allow_unbounded_trials: bool = false
# Set true only to permit timeout_seconds_per_trial: null. It has no effect while a finite trial timeout is configured.

# timeout_seconds_per_phase: float | None = null (>= 0 and finite when set)
# Per-invocation wallclock budget for this phase's GPU waits and trainer work. It is not a hard deadline for post-process extraction/gates; W&B polling can finish after it under its own timeout.
# This run-control field is excluded from the semantic fingerprint.

# allow_incomplete_on_timeout: bool = false
# When a phase/run deadline leaves fewer than n_trials terminal attempts, false rejects partial winner selection; true permits a winner only if at least one feasible COMPLETE trial exists.
# It does not rescue an ordinary per-trial timeout. Timeout handling takes precedence over max_consecutive_failures, and a persisted incomplete winner can be resumed only while this remains true.

# allow_partial_grid: bool = false
# False requires n_trials to equal the concrete grid cardinality; true permits a budget from 1 through cardinality. Used only with sampler.type: "grid" and excluded from the semantic fingerprint.

# allow_seed_search: bool = false
# False rejects search_space keys named `seed` or ending in `.seed`; set true only for an explicit variance audit. Excluded from the semantic fingerprint.

# gates: list[Gate] = []
# Contract gates run first, then this list. A failed gate fails the trial unless promotion exists with requires_gates: false, in which case the result is recorded as advisory.
# Gate shapes are defined below.

# promotion: Promotion | None = null
# Compares this phase's candidate winner with a prior exposed phase winner before exposing it downstream. Promotion keys and outcomes are defined below.

# timeout_seconds_per_run: float | None = null (>= 0 and finite when set)
# Per-invocation experiment budget shared across phases. It caps remaining GPU waits/trainer work, but post-process extraction and W&B polling can carry the invocation past the deadline.
# This field is outside semantic fingerprints; allow_incomplete_on_timeout remains a per-phase opt-in.

# env: dict[str, str] = {}
# Applied over the parent process environment. phasesweep then overwrites `PHASESWEEP_TRIAL_DIR`, `PHASESWEEP_TRIAL_ID`, `PHASESWEEP_PHASE`, `PHASESWEEP_RUN_NAME`, `PHASESWEEP_GENERATION_ID`, `PHASESWEEP_ATTEMPT_ID`, `PHASESWEEP_OVERRIDES_SHA256`, and `WANDB_RUN_ID` for every trial.
# WANDB_RUN_ID equals the immutable attempt ID; W&B extractors and gates query that ID instead of a display name.
# An active GPU assignment also overwrites CUDA_VISIBLE_DEVICES; CUDA_DEVICE_ORDER defaults to PCI_BUS_ID only when the environment did not already set it.

# SEARCH PARAMETER OBJECTS
# A search_space value must use exactly one discriminator shape.

# type: Literal["float"] (required)
# low: float (required; finite)
# high: float (required; finite and >= low)
# log: bool = false
# step: float | None = null (finite and > 0 when set)
# log: true requires low > 0 and forbids step. Grid rejects log and requires step to divide high - low evenly.

# type: Literal["int"] (required)
# low: int (required)
# high: int (required; >= low)
# log: bool = false
# step: int = 1 (> 0)
# log: true requires low > 0 and step: 1. Grid rejects log.

# type: Literal["categorical"] (required)
# choices: list[None | bool | int | finite float | str] (required; min length 1)
# Lists, mappings, objects, NaN, and infinities are rejected. CMA-ES rejects categorical parameters.

# EXTRACTOR OBJECTS
# An extractor must use exactly one discriminator shape. Every `path`/`file` below is a nonempty trial-relative path: absolute paths and any `..` component are rejected.
# Every JSON `key` is a nonempty dotted lookup path with no empty segment. Extractor runtime failures fail the trial.

# type: Literal["json"] (required)
# path: str (required)
# key: str (required)
# Constraint-only scalar extractor. The selected JSON value must be a finite JSON number; strings and booleans are rejected.

# type: Literal["json_envelope"] (required)
# path: str = "result.json"
# objective_name: str (required; nonempty)
# split: str (required; nonempty)
# policy: str (required; nonempty)
# checkpoint: str | None = null (nonempty when set)
# expected_step: int | None = null (>= 0)
# Requires schema_version=1, status=complete, matching generation/attempt IDs and resolved-overrides digest, a numeric objective value with the configured name/split, and evaluation metadata with the configured policy. Every envelope must identify a checkpoint and non-negative step; checkpoint and step are matched exactly when configured.

# type: Literal["log_regex"] (required)
# file: str = "stdout.log"
# stdout.log and stderr.log are captured automatically; another relative path may name a trainer-written log.
# pattern: str (required)
# Python regex with a named `(?P<value>...)` group. Invalid regex, a missing group, or no numeric match fails the trial.
# select: Literal["last", "first", "min", "max"] = "last"
# `first` returns on the first numeric match; the other modes scan the file line by line.

# type: Literal["wandb"] (required)
# entity: str (required)
# project: str (required)
# metric_key: str (required)
# Key in wandb.run.summary; the value must be a finite number, not a string or boolean.
# poll_seconds: float = 2.0 (> 0)
# timeout_seconds: float = 120.0 (>= 1)
# Requires the optional W&B dependency. Polling queries the immutable WANDB_RUN_ID assigned to this attempt and accepts only `finished`; `failed`, `crashed`, or `killed` fails immediately, and absence through timeout fails the trial. W&B request deadlines use whole seconds, so an active request may finish less than one second after this polling budget expires.

# GATE OBJECTS
# A gate must use exactly one discriminator shape. All `path` and JSON `key` fields obey the Extractor path/key invariants above.

# type: Literal["required_file"] (required)
# path: str (required)
# Passes only when the path exists and is a file.

# type: Literal["json_equals"] (required)
# path: str (required)
# key: str (required)
# value: Any (required)
# Equality is type-strict: boolean, integer, and float encodings are distinct. Use json_scalar_bound for numeric comparisons across integer/float JSON values.

# type: Literal["json_scalar_bound"] (required)
# path: str (required)
# key: str (required)
# min: float | None = null
# max: float | None = null
# At least one finite inclusive bound is required and min must be <= max; the JSON value must be numeric and finite.

# type: Literal["artifact_size"] (required)
# source: Literal["file", "directory", "json"] (required)
# path: str (required)
# key: str | None = null
# `json` requires key and a non-negative integer byte value; `file` and `directory` forbid key. Directory size recursively sums regular files.
# min_bytes: int | None = null (>= 0)
# max_bytes: int | None = null (>= 0)
# At least one inclusive bound is required and min_bytes must be <= max_bytes.

# type: Literal["sha256"] (required)
# path: str (required)
# sha256: str (required)
# Exactly 64 hexadecimal characters; normalized to lowercase. The path must exist and be a file.

# type: Literal["wandb_summary_required"] (required)
# entity: str (required)
# project: str (required)
# keys: list[str] (required; min length 1)
# poll_seconds: float = 2.0 (> 0)
# timeout_seconds: float = 120.0 (>= 1)
# Requires the optional W&B dependency. Lookup and terminal-state rules are the same as the W&B extractor. Once the attempt's run is finished, missing keys fail the gate immediately rather than polling for later summary updates.

# PROMOTION OBJECT

# min_delta_vs: str (required)
# In a phase, names a prior phase. In a suite study, names a prior study or `study.phase`; a bare study selects its final exposed phase.
# Suite comparisons are not checked for matching metric names/scales and use the candidate study's metric.goal, so compare only genuinely compatible metrics.

# min_delta: float = 0.0 (finite)
# Required signed improvement: baseline - candidate for minimize, candidate - baseline for maximize. Promotion occurs when improvement >= min_delta.

# requires_gates: bool = true
# True makes failed candidate gates fail trials and block promotion. False makes gates advisory and bases promotion only on metric delta.

# on_fail: Literal["stop", "skip", "continue_baseline"] = "stop"
# For a phase: stop raises, skip ends remaining phases with a partial result, and continue_baseline exposes a clone of the baseline winner.
# For a suite study: stop aborts the suite, skip omits the study (so a later depends_on reference aborts), and continue_baseline substitutes the baseline for the candidate study's final winner.

# SUITE ROOT
# A suite compiles each study into an Experiment named `<suite>__<study>` and runs studies in declaration order. Suite defaults use the Experiment key contracts above.

# suite: str (required)
# Nonempty ASCII `[A-Za-z0-9_-]+`; used in suite output paths and compiled experiment names.

# defaults: SuiteDefaults = {}
# SuiteDefaults object keys:
#   storage: str | None = null
#   workdir: str = "./runs"
#   trial_command: str | None = null
#   provenance: dict[str, str] = {}
#   override_format: Literal["argparse", "hydra", "json_file"] = "argparse"
#   metric: Metric | None = null
#   constraints: list[Constraint] = []
#   contracts: dict[str, Contract] = {}
#   env: dict[str, str] = {}
#   timeout_seconds_per_run: float | None = null (>= 0 and finite once compiled)
# Each resolved value follows the matching Experiment contract. trial_command and metric must be supplied here or by every study; provenance must resolve nonempty for persistent storage; workdir and override_format already have non-null defaults.
# timeout_seconds_per_run resets for each compiled study; it is not a suite-wide deadline.

# studies: list[Study] (required; min length 1)
# Study names must be unique. Each Study object accepts the following keys.

# name: str (required)
# Nonempty ASCII `[A-Za-z0-9_-]+`; appended to the suite name for paths and Optuna study names.

# depends_on: list[str] = []
# Prior study names that must have exposed results before this study starts. This neither reorders studies nor passes winner overrides into the dependent study.

# storage: str | None = null
# If omitted, inherits defaults.storage; explicit null clears a persistent default and selects in-memory storage.

# workdir: str | None = null
# If omitted, inherits defaults.workdir; explicit null blocks fallback and fails compilation because Experiment.workdir is required after resolution.

# trial_command: str | None = null
# If omitted, inherits defaults.trial_command; explicit null blocks fallback and fails compilation. It must resolve non-null.

# provenance: dict[str, str] | None = null
# If omitted, inherits defaults.provenance; a non-null mapping replaces the default mapping, while explicit null clears it to `{}`. The compiled persistent experiment requires at least one entry.

# override_format: Literal["argparse", "hydra", "json_file"] | None = null
# If omitted, inherits defaults.override_format; explicit null blocks fallback and fails compilation. The resolved value follows the Experiment contract.

# metric: Metric | None = null
# If omitted, inherits defaults.metric; explicit null blocks fallback and fails compilation. It must resolve non-null.

# constraints: list[Constraint] | None = null
# If omitted, inherits defaults.constraints; explicit null clears the inherited list to `[]`.

# contracts: dict[str, Contract] = {}
# Merges over defaults.contracts; a same-name study contract replaces that default entry. The default mapping cannot be cleared wholesale.

# phases: list[Phase] (required; min length 1)
# Uses the complete Phase contract above; there is no suite-level phase default.

# env: dict[str, str] | None = null
# Omitted or explicit null keeps defaults.env; a non-null mapping merges over it. The default environment cannot be cleared wholesale.

# timeout_seconds_per_run: float | None = null (>= 0 and finite once compiled)
# If omitted, inherits defaults.timeout_seconds_per_run; explicit null clears that default and disables the per-study run deadline.

# promotion: Promotion | None = null
# Compares this study's final exposed phase winner with the selected prior-study winner. Uses the Promotion contract above.
