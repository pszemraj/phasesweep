# PhaseSweep smoke sweep for https://github.com/pszemraj/decoder-pytorch-template.
#
# The trainer accepts YAML configs, so this example uses PhaseSweep's json_file override format plus run_trial.py to compose a per-trial YAML file.

experiment: decoder_template_hparam_smoke
storage: sqlite:///./examples/decoder_pytorch_template/runs/phases.db
workdir: ./examples/decoder_pytorch_template/runs/trials
trial_command: "python examples/decoder_pytorch_template/run_trial.py --template-root examples/decoder_pytorch_template/vendor/decoder-pytorch-template --base-config examples/decoder_pytorch_template/base.yaml --overrides-path {overrides_path} --trial-dir {trial_dir}"
override_format: json_file
env:
  CUDA_DEVICE_ORDER: PCI_BUS_ID

metric:
  name: val_loss
  goal: minimize
  extractor:
    type: json
    path: result.json
    key: val_loss

phases:
  - name: optimizer_scale
    comment: "First choose learning rate, the dominant optimizer-scale decision, while keeping the decoder architecture fixed."
    n_trials: 3
    sampler:
      type: grid
    search_space:
      learning_rate: { type: categorical, choices: [0.0003, 0.001, 0.003] }

  - name: weight_decay
    comment: "With optimizer scale locked, tune Adam weight decay as the regularization pass."
    inherits: [optimizer_scale]
    n_trials: 3
    sampler:
      type: grid
    search_space:
      weight_decay: { type: categorical, choices: [0.0, 0.0001, 0.001] }

  - name: clip_norm
    comment: "With scale and regularization locked, tune gradient clipping as the final stability/control pass."
    inherits: [weight_decay]
    n_trials: 3
    sampler:
      type: grid
    search_space:
      grad_clip_norm: { type: categorical, choices: [0.5, 1.0, 2.0] }
