# Example MCP catalog for the decoder-pytorch-template smoke sweep. Start it from the PhaseSweep repo root with:
#   phasesweep mcp --catalog examples/decoder_pytorch_template/catalog.yaml

state_dir: /tmp/phasesweep-mcp-decoder-template/state
max_concurrent_runs: 1
experiments:
  - id: decoder-template-smoke
    config: ./mcp_experiment.yaml
    description: "decoder-pytorch-template CPU smoke sweep through the YAML adapter"
    allow:
      launch: true
      cancel: true
      from_phase: true
