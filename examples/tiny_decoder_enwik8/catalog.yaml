# Example MCP catalog for the full tiny Enwik8 decoder sweep. Start it with:
#   phasesweep mcp serve --catalog examples/tiny_decoder_enwik8/catalog.yaml

state_dir: /tmp/phasesweep-mcp-tiny-decoder-enwik8/state
max_concurrent_runs: 1
experiments:
  - id: tiny-decoder-enwik8-hparams
    config: ./mcp_experiment.yaml
    cwd: ../..
    visible_params: all
    description: "9-trial CUDA sweep (1000 batches/trial) over LR, weight decay, and gradient clipping"
    allow:
      launch: true
      cancel: true
      from_phase: true
