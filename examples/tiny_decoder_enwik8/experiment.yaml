# Full PhaseSweep example for a tiny Enwik8 decoder trainer backed by https://github.com/pszemraj/decoder-pytorch-template.
#
# The trainer accepts YAML configs, so this example uses PhaseSweep's json_file override format plus run_trial.py to compose a per-trial YAML file.

experiment: tiny_decoder_enwik8_hparams
storage: sqlite:///./examples/tiny_decoder_enwik8/runs/phases.db
provenance:
  trainer: "run-trial-v1+decoder-template@9c90a551"
  data: "enwik8-template-download"
workdir: ./examples/tiny_decoder_enwik8/runs/trials
trial_command: "python examples/tiny_decoder_enwik8/run_trial.py --template-root examples/tiny_decoder_enwik8/upstream --base-config examples/tiny_decoder_enwik8/base.yaml --overrides-path {overrides_path} --trial-dir {trial_dir}"
override_format: json_file
env:
  CUDA_DEVICE_ORDER: PCI_BUS_ID

metric:
  name: val_loss
  goal: minimize
  extractor:
    type: json_envelope
    path: result.json
    objective_name: val_loss
    split: validation
    policy: final_checkpoint
    checkpoint: final.pt
    expected_step: 1000

phases:
  - name: optimizer_scale
    comment: "First choose learning rate, the dominant optimizer-scale decision, while keeping the decoder architecture fixed."
    n_trials: 3
    sampler:
      type: grid
    search_space:
      learning_rate: { type: categorical, choices: [0.0003, 0.001, 0.003] }

  - name: weight_decay
    comment: "With optimizer scale locked, tune Adam weight decay as the regularization pass."
    inherits: [optimizer_scale]
    n_trials: 3
    sampler:
      type: grid
    search_space:
      weight_decay: { type: categorical, choices: [0.0, 0.0001, 0.001] }

  - name: clip_norm
    comment: "With scale and regularization locked, tune gradient clipping as the final stability/control pass."
    inherits: [weight_decay]
    n_trials: 3
    sampler:
      type: grid
    search_space:
      grad_clip_norm: { type: categorical, choices: [0.5, 1.0, 2.0] }
