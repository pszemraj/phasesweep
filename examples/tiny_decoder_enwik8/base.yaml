# Fixed tiny Enwik8 decoder config for a small GPU-backed PhaseSweep example.
run_dir: runs/phasesweep-trial

num_tokens: 256
dim: 128
depth: 4
heads: 4
dim_head: 32
tied_embedding: true
ffn_dim_multiplier: 1.0
flash_attn: true
compile: false
use_autocast: true

num_batches: 1000
batch_size: 4
grad_accum_every: 1
learning_rate: 0.001
weight_decay: 0.0
grad_clip_norm: 1.0

data_path: data/enwik8.gz
seq_len: 128

validate_every: 100
val_batches: 5
generate_every: 1000000
save_every: 1000000
temperature: 1.0
min_p: 0.1

seed: 7
